<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overlay – Zeichenwerkzeug</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Toolbar ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 16px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  #toolbar label { font-size: 0.8rem; color: #aaa; }

  .tool-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  #colorPicker {
    width: 40px; height: 32px;
    border: 2px solid #444;
    border-radius: 6px;
    cursor: pointer;
    background: none;
    padding: 2px;
  }

  input[type=range] {
    width: 100px;
    accent-color: #e94560;
  }

  #widthPreview {
    width: 80px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #widthPreview canvas { display: block; }

  #clearBtn, #refreshBtn {
    padding: 6px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  #clearBtn { background: #e94560; color: #fff; }
  #refreshBtn { background: #0f3460; color: #e0e0e0; }
  #clearBtn:hover, #refreshBtn:hover { opacity: 0.85; }

  .tool-group span { font-size: 0.7rem; color: #888; }

  /* ── Main layout ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Window list ── */
  #sidebar {
    width: 240px;
    min-width: 180px;
    background: #16213e;
    border-right: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  #sidebarHeader {
    padding: 10px 12px;
    font-size: 0.75rem;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: 1px solid #0f3460;
  }

  #windowList {
    list-style: none;
    overflow-y: auto;
    flex: 1;
  }

  #windowList li {
    padding: 10px 12px;
    cursor: pointer;
    font-size: 0.82rem;
    border-bottom: 1px solid #0f3460;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.1s;
  }

  #windowList li:hover { background: #0f3460; }
  #windowList li.active { background: #e94560; color: #fff; }

  #windowList .win-title { font-weight: 600; }
  #windowList .win-size { font-size: 0.7rem; color: #aaa; margin-top: 2px; }
  #windowList li.active .win-size { color: #ffcdd2; }

  /* ── Canvas area ── */
  #canvasArea {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background: #0d1117;
  }

  #placeholder {
    color: #555;
    font-size: 1rem;
    text-align: center;
    pointer-events: none;
  }

  #canvasWrapper {
    position: relative;
    display: none;
    max-width: 100%;
    max-height: 100%;
  }

  #drawCanvas {
    display: block;
    max-width: 100%;
    max-height: calc(100vh - 56px);
    object-fit: contain;
    cursor: crosshair;
    touch-action: none;
  }

  /* ── Tools panel (right, collapsible) ── */
  #toolsPanel {
    display: flex;
    flex-direction: row;
    flex-shrink: 0;
    background: #16213e;
    border-left: 1px solid #0f3460;
    overflow: hidden;
    width: 32px;           /* collapsed: only the toggle tab */
    transition: width 0.25s ease;
  }

  #toolsPanel.open { width: 252px; }

  #toolsToggle {
    width: 32px;
    min-width: 32px;
    background: none;
    border: none;
    border-right: 1px solid #0f3460;
    cursor: pointer;
    color: #aaa;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    writing-mode: vertical-rl;
    letter-spacing: 0.1em;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    color: #888;
    gap: 6px;
    padding: 12px 0;
    transition: color 0.15s;
  }
  #toolsToggle:hover { color: #e0e0e0; }

  #toolsContent {
    width: 220px;
    min-width: 220px;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-section {
    border: 1px solid #0f3460;
    border-radius: 8px;
    overflow: hidden;
  }

  .panel-section-header {
    padding: 8px 10px;
    background: #0f3460;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #aaa;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-section-body {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .panel-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-size: 0.8rem;
  }

  .panel-row label { color: #aaa; white-space: nowrap; }

  .panel-row input[type=range] { width: 80px; }

  .panel-row input[type=color] {
    width: 36px; height: 28px;
    border: 2px solid #444;
    border-radius: 4px;
    cursor: pointer;
    background: none;
    padding: 1px;
  }

  .panel-row select {
    background: #1a1a2e;
    color: #e0e0e0;
    border: 1px solid #0f3460;
    border-radius: 4px;
    padding: 3px 6px;
    font-size: 0.8rem;
    cursor: pointer;
  }

  .toggle-switch {
    position: relative;
    width: 36px; height: 20px;
    flex-shrink: 0;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-switch .slider {
    position: absolute; inset: 0;
    background: #333;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-switch .slider::before {
    content: "";
    position: absolute;
    width: 14px; height: 14px;
    left: 3px; top: 3px;
    background: #888;
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle-switch input:checked + .slider { background: #e94560; }
  .toggle-switch input:checked + .slider::before {
    transform: translateX(16px);
    background: #fff;
  }

  .val-badge {
    font-size: 0.72rem;
    color: #888;
    min-width: 28px;
    text-align: right;
  }
</style>
</head>
<body>

<!-- ── Toolbar ── -->
<div id="toolbar">
  <div class="tool-group">
    <label>Farbe</label>
    <input type="color" id="colorPicker" value="#ff0000" title="Farbe wählen">
  </div>

  <div class="tool-group">
    <label>Stärke <span id="widthVal">4</span>px</label>
    <input type="range" id="strokeWidth" min="1" max="60" value="4">
  </div>

  <div class="tool-group">
    <label>Vorschau</label>
    <div id="widthPreview"><canvas id="previewCanvas" width="80" height="24"></canvas></div>
  </div>

  <div class="tool-group">
    <label>Deckkraft <span id="opacityVal">100</span>%</label>
    <input type="range" id="opacitySlider" min="10" max="100" value="100">
  </div>

  <button id="clearBtn">Löschen</button>
  <button id="refreshBtn">&#x21BB; Aktualisieren</button>
</div>

<!-- ── Main ── -->
<div id="main">
  <div id="sidebar">
    <div id="sidebarHeader">Fenster</div>
    <ul id="windowList"></ul>
  </div>

  <div id="canvasArea">
    <div id="placeholder">
      <p>&#8592; Fenster auswählen</p>
    </div>
    <div id="canvasWrapper">
      <canvas id="drawCanvas"></canvas>
    </div>
  </div>

  <!-- ── Tools panel ── -->
  <div id="toolsPanel">
    <button id="toolsToggle" title="Werkzeuge ein-/ausblenden">Werkzeuge</button>

    <div id="toolsContent">

      <!-- Grid section -->
      <div class="panel-section">
        <div class="panel-section-header">
          &#9783; Gitter
        </div>
        <div class="panel-section-body">
          <div class="panel-row">
            <label>Aktiv</label>
            <label class="toggle-switch">
              <input type="checkbox" id="gridEnabled">
              <span class="slider"></span>
            </label>
          </div>
          <div class="panel-row">
            <label>Typ</label>
            <select id="gridType">
              <option value="rect">Rechteckig</option>
              <option value="hex">Hexagonal</option>
            </select>
          </div>
          <div class="panel-row" id="hexStyleRow">
            <label>Hex-Stil</label>
            <select id="hexStyle">
              <option value="flat">Flach</option>
              <option value="pointy">Spitz</option>
            </select>
          </div>
          <div class="panel-row">
            <label>Feldgröße</label>
            <input type="range" id="gridSize" min="10" max="200" value="50">
            <span class="val-badge" id="gridSizeVal">50px</span>
          </div>
          <div class="panel-row">
            <label>Farbe</label>
            <input type="color" id="gridColor" value="#ffffff">
          </div>
          <div class="panel-row">
            <label>Deckkraft</label>
            <input type="range" id="gridOpacity" min="5" max="100" value="50">
            <span class="val-badge" id="gridOpacityVal">50%</span>
          </div>
        </div>
      </div>

    </div><!-- /toolsContent -->
  </div><!-- /toolsPanel -->
</div>

<script>
const socket = io();

// ── State ──────────────────────────────────────────────────────────────────
let isDrawing = false;
let localStrokes = [];
let currentStroke = null;
let screenshotImg = null;
let selectedWinId = null;

let gridConfig = {
  enabled:  false,
  type:     "rect",
  hexStyle: "flat",
  color:    "#ffffff",
  opacity:  0.5,
  cellSize: 50,
};

// ── Controls ───────────────────────────────────────────────────────────────
const colorPicker    = document.getElementById("colorPicker");
const strokeWidth    = document.getElementById("strokeWidth");
const opacitySlider  = document.getElementById("opacitySlider");
const widthVal       = document.getElementById("widthVal");
const opacityVal     = document.getElementById("opacityVal");
const clearBtn       = document.getElementById("clearBtn");
const refreshBtn     = document.getElementById("refreshBtn");
const canvas         = document.getElementById("drawCanvas");
const ctx            = canvas.getContext("2d");
const previewCanvas  = document.getElementById("previewCanvas");
const pCtx           = previewCanvas.getContext("2d");
const windowList     = document.getElementById("windowList");
const placeholder    = document.getElementById("placeholder");
const canvasWrapper  = document.getElementById("canvasWrapper");

function getColor()   { return colorPicker.value; }
function getWidth()   { return parseInt(strokeWidth.value); }
function getOpacity() { return parseInt(opacitySlider.value) / 100; }

strokeWidth.addEventListener("input", () => {
  widthVal.textContent = strokeWidth.value;
  updatePreview();
});

opacitySlider.addEventListener("input", () => {
  opacityVal.textContent = opacitySlider.value;
  updatePreview();
});

colorPicker.addEventListener("input", updatePreview);

function updatePreview() {
  pCtx.clearRect(0, 0, 80, 24);
  pCtx.strokeStyle = getColor();
  pCtx.lineWidth   = Math.min(getWidth(), 22);
  pCtx.globalAlpha = getOpacity();
  pCtx.lineCap     = "round";
  pCtx.beginPath();
  pCtx.moveTo(8, 12);
  pCtx.lineTo(72, 12);
  pCtx.stroke();
  pCtx.globalAlpha = 1;
}
updatePreview();

// ── Tools panel toggle ──────────────────────────────────────────────────────
const toolsPanel  = document.getElementById("toolsPanel");
const toolsToggle = document.getElementById("toolsToggle");
toolsToggle.addEventListener("click", () => toolsPanel.classList.toggle("open"));

// ── Grid controls ──────────────────────────────────────────────────────────
const gridEnabled    = document.getElementById("gridEnabled");
const gridType       = document.getElementById("gridType");
const hexStyle       = document.getElementById("hexStyle");
const hexStyleRow    = document.getElementById("hexStyleRow");
const gridSize       = document.getElementById("gridSize");
const gridSizeVal    = document.getElementById("gridSizeVal");
const gridColor      = document.getElementById("gridColor");
const gridOpacity    = document.getElementById("gridOpacity");
const gridOpacityVal = document.getElementById("gridOpacityVal");

function syncGridControlsToState() {
  gridEnabled.checked     = gridConfig.enabled;
  gridType.value          = gridConfig.type;
  hexStyle.value          = gridConfig.hexStyle;
  gridSize.value          = gridConfig.cellSize;
  gridSizeVal.textContent = gridConfig.cellSize + "px";
  gridColor.value         = gridConfig.color;
  gridOpacity.value       = Math.round(gridConfig.opacity * 100);
  gridOpacityVal.textContent = Math.round(gridConfig.opacity * 100) + "%";
  hexStyleRow.style.display = gridConfig.type === "hex" ? "" : "none";
}
syncGridControlsToState();

function emitGrid() {
  socket.emit("set_grid", gridConfig);
}

gridEnabled.addEventListener("change", () => {
  gridConfig.enabled = gridEnabled.checked;
  redraw(); emitGrid();
});

gridType.addEventListener("change", () => {
  gridConfig.type = gridType.value;
  hexStyleRow.style.display = gridConfig.type === "hex" ? "" : "none";
  redraw(); emitGrid();
});

hexStyle.addEventListener("change", () => {
  gridConfig.hexStyle = hexStyle.value;
  redraw(); emitGrid();
});

gridSize.addEventListener("input", () => {
  gridConfig.cellSize = parseInt(gridSize.value);
  gridSizeVal.textContent = gridSize.value + "px";
  redraw(); emitGrid();
});

gridColor.addEventListener("input", () => {
  gridConfig.color = gridColor.value;
  redraw(); emitGrid();
});

gridOpacity.addEventListener("input", () => {
  gridConfig.opacity = parseInt(gridOpacity.value) / 100;
  gridOpacityVal.textContent = gridOpacity.value + "%";
  redraw(); emitGrid();
});

// ── Window list ────────────────────────────────────────────────────────────
async function loadWindows() {
  try {
    const res = await fetch("/windows");
    const windows = await res.json();
    windowList.innerHTML = "";
    windows.forEach(w => {
      const li = document.createElement("li");
      li.dataset.id = w.id;
      li.innerHTML = `
        <div class="win-title">${escHtml(w.title)}</div>
        <div class="win-size">${w.width}×${w.height}</div>`;
      li.addEventListener("click", () => selectWindow(w.id, li));
      windowList.appendChild(li);
    });
  } catch (e) {
    console.error("Fehler beim Laden der Fensterliste:", e);
  }
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

refreshBtn.addEventListener("click", loadWindows);
loadWindows();

// ── Select window ──────────────────────────────────────────────────────────
function selectWindow(winId, li) {
  document.querySelectorAll("#windowList li").forEach(el => el.classList.remove("active"));
  li.classList.add("active");
  selectedWinId = winId;
  localStrokes = [];
  socket.emit("select_window", { win_id: winId });
  loadScreenshot(winId);
}

let _screenshotTimer = null;

function loadScreenshot(winId) {
  const img = new Image();
  img.onload = () => {
    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    screenshotImg = img;
    placeholder.style.display  = "none";
    canvasWrapper.style.display = "block";
    redraw();
  };
  img.onerror = () => {
    console.error("Screenshot konnte nicht geladen werden");
  };
  img.src = `/screenshot/${encodeURIComponent(winId)}?t=${Date.now()}`;

  if (_screenshotTimer) clearInterval(_screenshotTimer);
  _screenshotTimer = setInterval(() => refreshScreenshot(winId), 1000);
}

function refreshScreenshot(winId) {
  if (!selectedWinId || isDrawing) return;
  const img = new Image();
  img.onload = () => {
    if (img.naturalWidth !== canvas.width || img.naturalHeight !== canvas.height) {
      canvas.width  = img.naturalWidth;
      canvas.height = img.naturalHeight;
    }
    screenshotImg = img;
    redraw();
  };
  img.src = `/screenshot/${encodeURIComponent(winId)}?t=${Date.now()}`;
}

// ── Drawing ────────────────────────────────────────────────────────────────
function normalizePoint(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) / rect.width,
    y: (clientY - rect.top)  / rect.height
  };
}

function beginStroke(clientX, clientY) {
  if (!screenshotImg) return;
  isDrawing = true;
  currentStroke = {
    points:  [],
    color:   getColor(),
    width:   getWidth(),
    opacity: getOpacity()
  };
  const pt = normalizePoint(clientX, clientY);
  currentStroke.points.push(pt);
  socket.emit("stroke_begin", {
    color:   currentStroke.color,
    width:   currentStroke.width,
    opacity: currentStroke.opacity
  });
  socket.emit("stroke_point", pt);
}

function continueStroke(clientX, clientY) {
  if (!isDrawing || !currentStroke) return;
  const pt = normalizePoint(clientX, clientY);
  currentStroke.points.push(pt);
  socket.emit("stroke_point", pt);
  redraw();
}

function endStroke() {
  if (!isDrawing) return;
  isDrawing = false;
  if (currentStroke) {
    localStrokes.push(currentStroke);
    currentStroke = null;
  }
  socket.emit("stroke_end", {});
  redraw();
}

// Mouse
canvas.addEventListener("mousedown",  e => { e.preventDefault(); beginStroke(e.clientX, e.clientY); });
canvas.addEventListener("mousemove",  e => continueStroke(e.clientX, e.clientY));
canvas.addEventListener("mouseup",    () => endStroke());
canvas.addEventListener("mouseleave", () => endStroke());

// Touch
canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  beginStroke(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  continueStroke(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener("touchend", e => { e.preventDefault(); endStroke(); }, { passive: false });

clearBtn.addEventListener("click", () => {
  socket.emit("clear", {});
});

// ── Grid rendering ─────────────────────────────────────────────────────────
function drawGrid(cfg) {
  if (!cfg.enabled) return;
  ctx.save();
  ctx.strokeStyle = cfg.color;
  ctx.globalAlpha = cfg.opacity;
  ctx.lineWidth   = 1;

  if (cfg.type === "rect") {
    ctx.beginPath();
    for (let x = 0; x <= canvas.width; x += cfg.cellSize) {
      ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
    }
    for (let y = 0; y <= canvas.height; y += cfg.cellSize) {
      ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
    }
    ctx.stroke();
  } else {
    const r = cfg.cellSize;
    if (cfg.hexStyle === "flat") {
      drawFlatHexGrid(r);
    } else {
      drawPointyHexGrid(r);
    }
  }
  ctx.restore();
}

function hexPath(cx, cy, r, flat) {
  const offset = flat ? 0 : 30;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 180) * (60 * i + offset);
    const x = cx + r * Math.cos(a);
    const y = cy + r * Math.sin(a);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();
}

function drawFlatHexGrid(r) {
  const colW = r * 1.5;
  const rowH = r * Math.sqrt(3);
  for (let col = -1; col * colW - r < canvas.width + r; col++) {
    for (let row = -1; ; row++) {
      const cy = row * rowH + (col % 2 !== 0 ? rowH / 2 : 0);
      if (cy - r > canvas.height + r) break;
      hexPath(col * colW, cy, r, true);
    }
  }
}

function drawPointyHexGrid(r) {
  const colW = r * Math.sqrt(3);
  const rowH = r * 1.5;
  for (let row = -1; row * rowH - r < canvas.height + r; row++) {
    for (let col = -1; ; col++) {
      const cx = col * colW + (row % 2 !== 0 ? colW / 2 : 0);
      if (cx - r > canvas.width + r) break;
      hexPath(cx, row * rowH, r, false);
    }
  }
}

// ── Rendering ──────────────────────────────────────────────────────────────
function drawStroke(ctx, stroke) {
  const pts = stroke.points;
  if (pts.length < 1) return;
  ctx.save();
  ctx.strokeStyle  = stroke.color;
  ctx.lineWidth    = stroke.width;
  ctx.globalAlpha  = stroke.opacity;
  ctx.lineCap      = "round";
  ctx.lineJoin     = "round";
  ctx.beginPath();
  ctx.moveTo(pts[0].x * canvas.width, pts[0].y * canvas.height);
  if (pts.length === 1) {
    ctx.arc(pts[0].x * canvas.width, pts[0].y * canvas.height,
            stroke.width / 2, 0, Math.PI * 2);
    ctx.fillStyle = stroke.color;
    ctx.fill();
  } else {
    for (let i = 1; i < pts.length; i++) {
      ctx.lineTo(pts[i].x * canvas.width, pts[i].y * canvas.height);
    }
    ctx.stroke();
  }
  ctx.restore();
}

function redraw() {
  if (!screenshotImg) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(screenshotImg, 0, 0);
  drawGrid(gridConfig);
  for (const s of localStrokes)  drawStroke(ctx, s);
  if (currentStroke)             drawStroke(ctx, currentStroke);
}

// ── Socket.IO events ───────────────────────────────────────────────────────
socket.on("stroke_point", pt => {
  if (!currentStroke) return;
});

socket.on("stroke_end", () => {});

socket.on("clear", () => {
  localStrokes = [];
  currentStroke = null;
  redraw();
});

socket.on("window_selected", data => {
  if (data.win_id !== selectedWinId) {
    loadScreenshot(data.win_id);
  }
});

socket.on("grid_updated", data => {
  gridConfig = {
    enabled:  data.enabled  ?? gridConfig.enabled,
    type:     data.type     ?? gridConfig.type,
    hexStyle: data.hexStyle ?? gridConfig.hexStyle,
    color:    data.color    ?? gridConfig.color,
    opacity:  data.opacity  ?? gridConfig.opacity,
    cellSize: data.cellSize ?? gridConfig.cellSize,
  };
  syncGridControlsToState();
  redraw();
});

socket.on("connect", () => {
  if (selectedWinId) socket.emit("sync_request", {});
});

socket.on("sync_response", data => {
  localStrokes = data.strokes.map(s => ({
    points:  s.points,
    color:   s.color,
    width:   s.width,
    opacity: s.opacity
  }));
  if (data.grid) {
    gridConfig = { ...gridConfig, ...data.grid };
    syncGridControlsToState();
  }
  redraw();
});
</script>
